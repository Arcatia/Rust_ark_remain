<title>RUST ARK | Transfer</title>
<link rel="stylesheet" href="style.css">
<style>
body{display:grid;place-items:center;min-height:100vh}
.boot{width:min(760px,calc(100% - 28px));border:1px solid var(--line);background:rgba(7,16,28,.78);padding:42px;clip-path:polygon(4% 0,96% 0,100% 8%,100% 92%,96% 100%,4% 100%,0 92%,0 8%);box-shadow:0 0 60px rgba(0,0,0,.6)}
.bar{height:18px;border:1px solid var(--line);background:#030811;overflow:hidden;margin-top:28px}
.bar span{display:block;height:100%;width:100%;background:repeating-linear-gradient(90deg,var(--pink) 0 18px,rgba(255,127,178,.45) 18px 22px,transparent 22px 26px);animation:load 1.4s steps(8,end)}
@keyframes load{from{width:0}to{width:100%}}
</style>
</head>
<body>
  <main class="boot">
    <div class="kicker">ARCHIVE ACCESS SEQUENCE</div>
    <h1>RUST ARK</h1>
    <div class="subtitle">LOADING CHARACTER DATABASE</div>
    <div class="bar"><span></span></div>
  </main>
</body>
