<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RUST ARK | Loading</title>
<style>

:root{
  --bg:#050b14;
  --panel:#081321;
  --panel2:#0c1828;
  --line:#36506b;
  --soft:rgba(145,180,220,.28);
  --text:#d9e9f8;
  --muted:#7f9ab6;
  --pink:#ff7fb2;
  --blue:#9fc9ff;
  --amber:#ffd18a;
  --green:#9bf2cf;
  --danger:#ff5f99;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; min-height:100vh;
  background:
    radial-gradient(circle at 20% 0%, rgba(159,201,255,.12), transparent 30%),
    radial-gradient(circle at 88% 96%, rgba(255,127,178,.10), transparent 30%),
    linear-gradient(145deg,#040812,#091321 45%,#050b14);
  color:var(--text);
  font-family:"Segoe UI","Pretendard","Apple SD Gothic Neo",system-ui,sans-serif;
  letter-spacing:.06em;
}
a{color:inherit;text-decoration:none}
.page{
  width:min(1180px, calc(100% - 28px));
  margin:22px auto;
  position:relative;
  border:1px solid var(--line);
  background:linear-gradient(145deg,rgba(8,19,33,.96),rgba(6,13,24,.98));
  clip-path:polygon(2.5% 0,97.5% 0,100% 2.5%,100% 97.5%,97.5% 100%,2.5% 100%,0 97.5%,0 2.5%);
  box-shadow:0 0 46px rgba(0,0,0,.55), inset 0 0 90px rgba(159,201,255,.04);
  padding:38px 38px 34px 92px;
  overflow:hidden;
}
.page:before{
  content:""; position:absolute; inset:15px;
  border:1px solid rgba(145,180,220,.25);
  pointer-events:none;
  clip-path:polygon(2% 0,98% 0,100% 2%,100% 98%,98% 100%,2% 100%,0 98%,0 2%);
}
.page:after{
  content:""; position:absolute; inset:0;
  background:
    linear-gradient(transparent 0 96%, rgba(159,201,255,.05) 97%),
    repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 4px);
  opacity:.28;
  pointer-events:none;
}
.rail{
  position:absolute; left:18px; top:64px; bottom:64px; width:48px;
  border-left:1px solid var(--line); border-right:1px solid var(--line);
  display:flex; flex-direction:column; align-items:center;
  color:var(--muted); z-index:2;
}
.rail .icon{height:58px;width:100%;display:grid;place-items:center;border-bottom:1px solid var(--soft);color:var(--pink);font-size:20px}
.rail .vertical{writing-mode:vertical-rl;text-orientation:mixed;font-size:23px;letter-spacing:.26em;font-weight:800;color:#6988ad;margin-top:36px}
.rail .small{margin-top:auto;margin-bottom:22px;writing-mode:vertical-rl;font-size:10px;letter-spacing:.28em;color:var(--pink)}
.header{
  display:grid; grid-template-columns:1fr auto; gap:24px; align-items:start;
  position:relative; z-index:3; padding-bottom:26px; border-bottom:1px solid var(--soft);
}
.kicker{color:var(--muted);font-size:12px;letter-spacing:.34em;margin-bottom:12px}
h1{
  margin:0; color:var(--pink);
  font-size:clamp(34px,5.6vw,62px); letter-spacing:.35em; line-height:1.02;
}
.subtitle{margin-top:14px;color:var(--muted);font-size:14px;letter-spacing:.42em}
.emblem{
  width:122px;height:122px;border:1px solid var(--soft);border-radius:50%;
  display:grid;place-items:center;position:relative;color:var(--blue);
}
.emblem:before{content:"";position:absolute;width:80px;height:80px;border:1px dashed var(--soft);border-radius:50%}
.emblem:after{content:"";position:absolute;width:102px;height:102px;border-top:2px solid var(--pink);border-radius:50%;animation:spin 7s linear infinite}
.emblem b{font-size:42px;transform:rotate(-12deg)}
@keyframes spin{to{transform:rotate(360deg)}}
.topnav{
  position:relative;z-index:3;display:flex;gap:10px;flex-wrap:wrap;margin:24px 0 0;
}
.topnav a{
  border:1px solid var(--soft); padding:10px 14px; color:var(--blue);
  background:rgba(159,201,255,.035); font-size:12px; letter-spacing:.22em;
}
.topnav a:hover{border-color:var(--pink);color:var(--pink)}
.section{
  position:relative; z-index:3; margin-top:28px;
  border:1px solid var(--soft);
  background:rgba(7,16,28,.56);
  padding:24px;
}
.section-title{
  display:flex;align-items:center;gap:12px;margin:0 0 18px;
  color:var(--blue);font-weight:800;font-size:15px;letter-spacing:.32em;
}
.section-title:before{content:"";width:10px;height:10px;background:var(--pink);box-shadow:0 0 14px rgba(255,127,178,.55)}
.grid-2{display:grid;grid-template-columns:1.15fr .85fr;gap:22px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.lore{
  color:#c8d8e9;line-height:1.95;font-size:15px;letter-spacing:.035em;word-break:keep-all;
}
.lore p{margin:0 0 18px}
.callout{
  border-left:3px solid var(--pink);
  background:linear-gradient(90deg,rgba(255,127,178,.12),transparent);
  padding:16px 18px; color:#f4d9e5; line-height:1.8; font-size:14px;
}
.data-list{display:grid;gap:14px}
.data{
  display:grid;grid-template-columns:132px 1fr;gap:12px;align-items:start;
  padding-bottom:12px;border-bottom:1px dashed rgba(145,180,220,.26);
}
.data dt{margin:0;color:var(--blue);font-size:12px;letter-spacing:.22em}
.data dd{margin:0;color:var(--text);font-size:14px;line-height:1.65;letter-spacing:.04em}
.card{
  border:1px solid var(--soft);
  background:linear-gradient(145deg,rgba(15,29,48,.74),rgba(7,16,28,.68));
  padding:18px; min-height:178px; position:relative; overflow:hidden;
}
.card:before{content:"";position:absolute;right:-40px;top:-40px;width:110px;height:110px;border:1px dashed var(--soft);border-radius:50%;opacity:.45}
.card h3{margin:0 0 12px;color:var(--pink);letter-spacing:.22em;font-size:16px}
.card p{margin:0;color:#c7d8e8;line-height:1.72;font-size:13.5px;letter-spacing:.035em;word-break:keep-all}
.tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.tag{border:1px solid var(--soft);padding:6px 9px;color:var(--muted);font-size:10px;letter-spacing:.18em}
.timeline{display:grid;gap:14px}
.event{display:grid;grid-template-columns:120px 1fr;gap:16px;border-bottom:1px dashed var(--soft);padding-bottom:14px}
.event b{color:var(--pink);font-size:12px;letter-spacing:.24em}
.event span{line-height:1.75;color:#c8d8e9;font-size:14px}
.character-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.character{
  border:1px solid var(--soft); padding:18px; min-height:132px;
  background:rgba(159,201,255,.035);
  display:flex; flex-direction:column; justify-content:space-between;
}
.character strong{color:var(--text);font-size:16px;letter-spacing:.18em}
.character small{color:var(--muted);line-height:1.5;margin-top:8px;display:block}
.character .link{margin-top:16px;color:var(--pink);font-size:11px;letter-spacing:.24em}
.warning{
  color:#ffd8e7;border:1px solid rgba(255,127,178,.35);
  background:rgba(255,127,178,.08);
  padding:18px;line-height:1.8;font-size:14px;
}
footer{
  position:relative;z-index:3;margin-top:26px;padding-top:18px;border-top:1px solid var(--soft);
  display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:11px;letter-spacing:.24em;
}
.pink{color:var(--pink)}
.blue{color:var(--blue)}
@media(max-width:920px){
  .page{padding:30px 22px 30px 72px}
  .header,.grid-2{grid-template-columns:1fr}
  .grid-3,.character-grid{grid-template-columns:1fr}
  .emblem{width:92px;height:92px}
  .data,.event{grid-template-columns:1fr}
  h1{letter-spacing:.2em}
}
@media(max-width:560px){
  body{background:#050b14}
  .page{width:100%;margin:0;min-height:100vh;clip-path:none;padding-left:72px}
  .rail{left:10px}
  .section{padding:18px}
}

body{display:grid;place-items:center;overflow:hidden}
.boot{width:min(860px,calc(100% - 28px));position:relative;z-index:4;border:1px solid var(--line);background:rgba(7,16,28,.78);padding:46px;clip-path:polygon(4% 0,96% 0,100% 8%,100% 92%,96% 100%,4% 100%,0 92%,0 8%);box-shadow:0 0 60px rgba(0,0,0,.6)}
.boot:before{content:"";position:absolute;inset:14px;border:1px solid var(--soft);pointer-events:none}
.boot-head{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;border-bottom:1px solid var(--soft);padding-bottom:24px}
.boot h1{font-size:clamp(34px,7vw,68px);letter-spacing:.34em}
.boot-sub{margin-top:14px;color:var(--muted);letter-spacing:.34em;font-size:13px}
.scanner{width:136px;height:136px;border:1px solid var(--soft);border-radius:50%;display:grid;place-items:center;position:relative;color:var(--blue)}
.scanner:before{content:"";position:absolute;inset:18px;border:1px dashed var(--soft);border-radius:50%}
.scanner:after{content:"";position:absolute;inset:0;border-top:3px solid var(--pink);border-radius:50%;animation:spin 1.2s linear infinite}
.scanner b{font-size:42px}
.log{margin:30px 0 22px;border:1px solid var(--soft);padding:18px;background:rgba(159,201,255,.035);min-height:160px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#b8cce0;font-size:13px;line-height:1.9;letter-spacing:.08em}
.log div{opacity:0;transform:translateY(5px);animation:logIn .28s ease forwards}
@keyframes logIn{to{opacity:1;transform:translateY(0)}}
.load-wrap{border:1px solid var(--soft);padding:10px;background:rgba(0,0,0,.18)}
.load-top{display:flex;justify-content:space-between;color:var(--blue);font-size:12px;letter-spacing:.28em;margin-bottom:10px}
.track{height:22px;border:1px solid var(--line);background:#040812;overflow:hidden;position:relative}
.bar{height:100%;width:0;background:repeating-linear-gradient(90deg,var(--pink) 0 18px,rgba(255,127,178,.45) 18px 22px,transparent 22px 26px);box-shadow:0 0 18px rgba(255,127,178,.4);transition:width .18s steps(3,end)}
.track:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transform:translateX(-110%);animation:sweep 1.2s linear infinite}
@keyframes sweep{to{transform:translateX(110%)}}
.status{margin-top:24px;text-align:center;color:var(--muted);letter-spacing:.32em;font-size:13px;min-height:22px}
.flash{position:fixed;inset:0;background:rgba(255,127,178,.0);pointer-events:none;z-index:20}
.flash.active{animation:flash .72s ease forwards}
@keyframes flash{0%{background:rgba(159,201,255,0)}30%{background:rgba(159,201,255,.18)}100%{background:rgba(255,127,178,0)}}
@media(max-width:680px){.boot{padding:32px 22px}.boot-head{grid-template-columns:1fr}.scanner{width:98px;height:98px}}
</style>
</head>
<body>
  <main class="boot">
    <div class="boot-head">
      <div>
        <div class="kicker">ARCHIVE ACCESS SEQUENCE</div>
        <h1>RUST ARK</h1>
        <div class="boot-sub">WORLD INDEX // AUTO TRANSFER</div>
      </div>
      <div class="scanner"><b>◆</b></div>
    </div>

    <section class="log" id="log"></section>

    <section class="load-wrap">
      <div class="load-top">
        <span>LOADING WORLD DATA</span>
        <span id="percent">000%</span>
      </div>
      <div class="track"><div class="bar" id="bar"></div></div>
    </section>

    <div class="status" id="status">INITIALIZING...</div>
  </main>
  <div class="flash" id="flash"></div>

<script>
const logs = [
  "[BOOT] Rust Ark archive protocol initialized.",
  "[SCAN] Old war records detected.",
  "[LOCK] Species hierarchy file recovered.",
  "[ALERT] Human sovereignty status: COLLAPSED.",
  "[SYNC] Plant / Animal / Insect uprising data connected.",
  "[GATE] Transferring to world page..."
];

const logBox = document.getElementById("log");
const bar = document.getElementById("bar");
const percent = document.getElementById("percent");
const statusEl = document.getElementById("status");
const flash = document.getElementById("flash");

let value = 0;
let logIndex = 0;

function addLog(){
  if(logIndex >= logs.length) return;
  const line = document.createElement("div");
  line.textContent = logs[logIndex];
  line.style.animationDelay = "0s";
  logBox.appendChild(line);
  logIndex++;
}

addLog();

const timer = setInterval(() => {
  const jump = Math.floor(Math.random() * 9) + 4;
  value = Math.min(100, value + jump);
  bar.style.width = value + "%";
  percent.textContent = String(value).padStart(3, "0") + "%";

  if(value > logIndex * 16 && logIndex < logs.length) addLog();

  if(value >= 100) {
    clearInterval(timer);
    statusEl.textContent = "ACCESS GRANTED // ENTERING WORLD INDEX";
    flash.classList.add("active");
    setTimeout(() => {
      window.location.href = "rust_ark_world_page.html";
    }, 1150);
  }
}, 180);
</script>
</body>
</html>
